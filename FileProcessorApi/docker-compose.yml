services:
  api:
    build: .
    container_name: fp
    ports:
      - "8080:8080"
    volumes:
      - fileprocessor-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  fileprocessor-data: